<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Thrive 55+ · The Career Direction Program</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#187878;--teal-d:#0F6E56;--teal-t:#E6F2EE;
  --navy:#17324D;--ink:#26302f;--muted:#6a736f;
  --coral:#E38E76;--coral-d:#B4553A;--coral-t:#FBEDE7;
  --cream:#FBF8F3;--card:#ffffff;--line:#ECE4D9;--line2:#E4EAE7;
  --shadow:0 1px 2px rgba(20,40,35,.04),0 8px 24px rgba(20,40,35,.06);
  --serif:"Fraunces",Georgia,"Times New Roman",serif;
  --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:var(--sans);color:var(--ink);background:var(--cream);line-height:1.6;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
h1,h2,h3{font-family:var(--serif);color:var(--navy);font-weight:600;line-height:1.15;margin:0}
p{margin:0 0 1em}
a{color:inherit;text-decoration:none}
.wrap{max-width:1080px;margin:0 auto;padding:0 22px}
.narrow{max-width:820px}
.serif{font-family:var(--serif)}
.eyebrow{font-size:12.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--teal);font-weight:600}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--teal);color:#fff;border:none;border-radius:999px;padding:13px 24px;font-size:15px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:.15s}
.btn:hover{background:#136565;transform:translateY(-1px)}
.btn.big{padding:15px 30px;font-size:16px}
.btn.ghost{background:transparent;color:var(--navy);border:1.5px solid var(--line)}
.btn.ghost:hover{background:#fff;border-color:var(--teal)}
.btn.coral{background:var(--coral)}
.btn.coral:hover{background:#d67c62}
.btn.sm{padding:9px 16px;font-size:14px}
.pill{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;padding:6px 13px;border-radius:999px}
.pill.coral{background:var(--coral-t);color:var(--coral-d)}
.pill.teal{background:var(--teal-t);color:var(--teal-d)}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}
.muted{color:var(--muted)}
.center{text-align:center}
.grid{display:grid;gap:18px}
section{padding:64px 0}
.dot{width:6px;height:6px;border-radius:50%;background:var(--coral)}

/* prototype switcher */
.protobar{position:sticky;top:0;z-index:50;background:#12212f;color:#dfe8e4;font-size:12.5px}
.protobar .wrap{display:flex;align-items:center;justify-content:space-between;height:40px}
.seg{display:inline-flex;background:rgba(255,255,255,.08);border-radius:999px;padding:3px}
.seg button{background:transparent;border:none;color:#cdd8d3;font-family:var(--sans);font-size:12.5px;font-weight:600;padding:6px 14px;border-radius:999px;cursor:pointer}
.seg button.on{background:#fff;color:#12212f}

/* top nav */
.topnav{background:rgba(251,248,243,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);position:sticky;top:40px;z-index:40}
.topnav .wrap{display:flex;align-items:center;justify-content:space-between;height:66px}
.brand{font-family:var(--serif);font-weight:600;font-size:21px;color:var(--navy)}
.brand b{color:var(--teal)}
.navlinks{display:flex;gap:26px;font-size:14.5px;color:var(--muted);font-weight:500}
.navlinks a{cursor:pointer}
.navlinks a:hover{color:var(--teal)}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--teal-t);color:var(--teal-d);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px}

/* hero */
.hero{display:grid;grid-template-columns:1.05fr .95fr;gap:44px;align-items:center;padding:58px 0 40px}
.hero h1{font-size:46px}
.hero .sub{font-size:19px;color:var(--muted);margin:18px 0 26px;max-width:30em}
.heroimg{position:relative}
.heroimg img{border-radius:22px;box-shadow:var(--shadow)}
.floatcard{position:absolute;left:-14px;bottom:-16px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px 14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px}
.floatcard img{width:40px;height:40px;border-radius:50%}
.stat-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff}
.stat-strip>div{padding:18px 20px;border-right:1px solid var(--line)}
.stat-strip>div:last-child{border-right:none}
.stat-strip .n{font-family:var(--serif);font-size:24px;color:var(--navy);font-weight:600}
.loop{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.loopcard{padding:26px 22px;background:#fff;border:1px solid var(--line);border-radius:18px}
.loopcard .ic{width:44px;height:44px;border-radius:12px;background:var(--teal-t);color:var(--teal-d);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:600;font-size:19px;margin-bottom:14px}
.phase-row{display:flex;gap:16px;align-items:flex-start;padding:18px 0;border-bottom:1px solid var(--line)}
.phase-row:last-child{border-bottom:none}
.phase-num{flex:none;width:40px;height:40px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:600}
.phase-num.alt{background:var(--teal)}
.wk{font-size:12.5px;color:var(--teal);font-weight:600;letter-spacing:.04em}
.feat{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.feat .card{padding:22px}
.feat .fic{font-size:22px;margin-bottom:8px}
.guides{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.guide{display:flex;gap:16px;align-items:center;padding:20px}
.guide img{width:76px;height:76px;border-radius:16px;object-fit:cover}
.band{background:var(--navy);color:#eaf1ee;border-radius:24px;padding:44px;text-align:center}
.band h2{color:#fff;font-size:30px}
.foot{padding:40px 0;color:var(--muted);font-size:13.5px;border-top:1px solid var(--line)}

/* member */
.cohortbar{background:linear-gradient(100deg,#0F6E56,#187878);color:#eafaf4;border-radius:20px;padding:22px 26px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.cohortbar .ring{--p:33;flex:none;width:64px;height:64px;border-radius:50%;background:conic-gradient(#F0997B calc(var(--p)*1%),rgba(255,255,255,.22) 0);display:flex;align-items:center;justify-content:center}
.cohortbar .ring i{width:48px;height:48px;border-radius:50%;background:#0F6E56;display:flex;align-items:center;justify-content:center;font-style:normal;font-weight:600;color:#fff;font-size:13px}
.week-card{padding:24px}
.stepline{display:flex;gap:14px;align-items:flex-start;padding:14px 0;border-bottom:1px dashed var(--line)}
.stepline:last-child{border-bottom:none}
.stepnum{flex:none;width:30px;height:30px;border-radius:50%;background:var(--teal-t);color:var(--teal-d);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px}
.stepnum.done{background:var(--teal);color:#fff}
.track{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.track .t{padding:12px 10px;border-radius:12px;background:#fff;border:1px solid var(--line);text-align:center}
.track .t.cur{border-color:var(--teal);background:var(--teal-t)}
.track .t.done{background:#fff}
.track .t .s{font-size:11px;color:var(--muted)}
.track .t .nm{font-size:12.5px;font-weight:600;color:var(--navy);margin-top:3px;line-height:1.25}
.feed .post{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--line)}
.feed .post:last-child{border-bottom:none}
.feed .pav{width:36px;height:36px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px}
.check{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;cursor:pointer;background:#fff}
.check.on{background:var(--teal-t);border-color:var(--teal)}
.check input{margin-top:4px}
.lesson{display:flex;gap:16px;align-items:center;padding:18px;background:#fff;border:1px solid var(--line);border-radius:16px}
.lesson .thumb{flex:none;width:132px;height:80px;border-radius:12px;background:var(--teal-d);color:#cdeee2;display:flex;align-items:center;justify-content:center;font-size:26px}
textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;font-family:var(--sans);font-size:14.5px;resize:vertical;min-height:70px}
input[type=text],input[type=email]{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;font-family:var(--sans);font-size:15px}
@media(max-width:820px){.hero{grid-template-columns:1fr}.loop,.feat,.track,.guides{grid-template-columns:1fr 1fr}.navlinks{display:none}}
</style>
</head>

<div class="feat">
  <div class="card"><div class="fic">🎬</div><h3 style="font-size:17px">Short video lessons</h3><p class="muted" style="margin:6px 0 0;font-size:14.5px">Branded, calm, and to the point — watch on any device.</p></div>
  <div class="card"><div class="fic">📓</div><h3 style="font-size:17px">The method workbook</h3><p class="muted" style="margin:6px 0 0;font-size:14.5px">Score your strain, capture your value, track your reconnaissance.</p></div>
  <div class="card"><div class="fic">🗣️</div><h3 style="font-size:17px">Live cohort calls</h3><p class="muted" style="margin:6px 0 0;font-size:14.5px">Weekly group calls with Sue and Alyson — bring your questions.</p></div>
  <div class="card"><div class="fic">👥</div><h3 style="font-size:17px">Private community</h3><p class="muted" style="margin:6px 0 0;font-size:14.5px">A small, kind group of nurses doing the same work at the same time.</p></div>
  <div class="card"><div class="fic">💵</div><h3 style="font-size:17px">Financial readiness</h3><p class="muted" style="margin:6px 0 0;font-size:14.5px">Alyson helps you weigh income, benefits, and timing before you move.</p></div>
  <div class="card"><div class="fic">📖</div><h3 style="font-size:17px">Your digital book</h3><p class="muted" style="margin:6px 0 0;font-size:14.5px">Yours to keep, delivered the day your cohort begins.</p></div>
</div></div></section>

<section id="guides" style="background:#fff;border-top:1px solid var(--line)"><div class="wrap">
<div class="center" style="margin-bottom:26px"><span class="eyebrow">Your guides</span><h2 style="font-size:30px;margin-top:8px">Nurses helping nurses</h2></div>
<div class="guides">
  <div class="card guide"><img src="${IMG.sue}" alt="Sue Adair"><div><h3 style="font-size:19px">Sue Adair, BSN, RN</h3><p class="muted" style="margin:4px 0 0;font-size:14.5px">Founder of Thrive 55+. Creator of the Career Direction Method™, built from decades at the bedside and in coaching.</p></div></div>
  <div class="card guide"><div style="width:76px;height:76px;border-radius:16px;background:var(--coral-t);color:var(--coral-d);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:26px;font-weight:600">A</div><div><h3 style="font-size:19px">Alyson</h3><p class="muted" style="margin:4px 0 0;font-size:14.5px">Guides the financial side — what to know about income, benefits, and timing before a career change.</p></div></div>
</div></div></section>

<section id="join"><div class="wrap"><div class="band">
  <span class="pill coral" style="background:rgba(255,255,255,.14);color:#ffe3d6"><span class="dot"></span> Cohort 3 · starts Aug 4</span>
  <h2 style="margin:16px 0 6px">Join the next cohort</h2>
  <p style="color:#cfe0da;font-size:17px;max-width:34em;margin:0 auto 22px">A small group starts together and finishes together. Seats are limited so the community stays close.</p>
  <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
    <button class="btn coral big" onclick="go('enroll')">Reserve your seat</button>
    <button class="btn ghost big" style="color:#fff;border-color:rgba(255,255,255,.4)" onclick="setView('member')">Preview the member area</button>
  </div>
</div></div></section>

<div class="foot"><div class="wrap" style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px">
  <span class="brand" style="font-size:17px">Thrive <b>55+</b> Nursing Advantage™</span>
  <span>© 2026 Sue Adair · A clickable prototype</span>
</div></div>`;}

/* ---------- ENROLL ---------- */
function enrollScreen(){return pubnav()+`<div class="wrap narrow fadein" style="padding:46px 0;max-width:560px">
  <button class="btn ghost sm" onclick="go('landing')">← Back</button>
  <div class="card" style="padding:30px;margin-top:16px">
    <span class="pill coral"><span class="dot"></span> Cohort 3 · starts Aug 4</span>
    <h2 style="font-size:26px;margin:14px 0 4px">Reserve your seat</h2>
    <p class="muted" style="margin-top:0">Join 23 other experienced nurses. You'll get your workbook and community access the day the cohort begins.</p>
    <label class="muted" style="font-size:13px">Your name</label>
    <input type="text" id="e_name" value="Karen" style="margin:4px 0 12px">
    <label class="muted" style="font-size:13px">Email</label>
    <input type="email" id="e_email" value="karen@email.com" style="margin:4px 0 18px">
    <button class="btn big" style="width:100%" onclick="enroll()">Join Cohort 3 →</button>
    <p class="center muted" style="font-size:12px;margin:12px 0 0">Prototype — no payment is taken.</p>
  </div>
</div>`;}

/* ---------- MEMBER NAV ---------- */
function memnav(){return `<div class="topnav"><div class="wrap">
  <span class="brand">Thrive <b>55+</b></span>
  <span class="navlinks"><a onclick="go('dashboard')">Dashboard</a><a onclick="go('phase')">This week</a><a onclick="go('cohort')">Cohort</a><a onclick="alert('Prototype: resources — workbook, book, replays.')">Resources</a></span>
  <span class="avatar">${S.initials}</span>
</div></div>`;}

/* ---------- MEMBER WELCOME ---------- */
function welcomeMember(){return memnav()+`<div class="wrap narrow fadein center" style="padding:56px 0;max-width:600px">
  <span class="pill teal">✓ You're in Cohort 3</span>
  <h1 style="font-size:34px;margin:16px 0 8px">Welcome, ${S.name}.</h1>
  <p class="muted" style="font-size:17px">Your cohort begins together. Here's your home base — your weekly focus, your journey, and your people.</p>
  <button class="btn big" style="margin-top:8px" onclick="go('dashboard')">Go to my dashboard →</button>
</div>`;}

/* ---------- DASHBOARD ---------- */
function progressPct(){const done=PHASES.filter(p=>p.st==="done").length;return Math.round(done/PHASES.length*100);}
function dashboard(){return memnav()+`<div class="wrap fadein" style="padding:26px 0 60px">
  <div class="cohortbar">
    <div style="display:flex;align-items:center;gap:18px">
      <div class="ring" style="--p:${progressPct()}"><i>${progressPct()}%</i></div>
      <div><div style="font-size:13px;opacity:.85">Cohort 3 · Week 2 of 6</div><div style="font-family:var(--serif);font-size:22px;font-weight:600">Capture Your Value</div><div style="font-size:13px;opacity:.85">Next live call · Thursday 6:00pm CT</div></div>
    </div>
    <button class="btn coral" onclick="go('phase')">Go to this week →</button>
  </div>

  <div style="display:grid;grid-template-columns:1.4fr .9fr;gap:20px;margin-top:20px">
    <div class="card week-card">
      <span class="eyebrow">This week's focus</span>
      <h2 style="font-size:23px;margin:8px 0 2px">Week 2 · Capture Your Value</h2>
      <p class="muted" style="margin-top:0">Name the strengths you keep dismissing — then decide what you'll carry into your next role.</p>
      <div style="margin-top:8px">
        <div class="stepline"><div class="stepnum done">✓</div><div><b>Learn</b> · Watch the 9-minute lesson<div class="muted" style="font-size:13.5px">Value: what you bring with you</div></div></div>
        <div class="stepline"><div class="stepnum">2</div><div><b>Do this week's mission</b><div class="muted" style="font-size:13.5px">List five strengths + choose one to carry forward</div></div></div>
        <div class="stepline"><div class="stepnum">3</div><div><b>Share with your cohort</b><div class="muted" style="font-size:13.5px">Post one strength — then join Thursday's call</div></div></div>
      </div>
      <button class="btn" style="margin-top:16px" onclick="go('phase')">Continue this week →</button>
    </div>

    <div class="card" style="padding:22px" class="feed">
      <div style="display:flex;justify-content:space-between;align-items:center"><b>Cohort feed</b><a class="muted" style="font-size:13px;cursor:pointer" onclick="go('cohort')">See all</a></div>
      <div class="feed" style="margin-top:8px">${FEED.slice(0,3).map(feedRow).join("")}</div>
    </div>
  </div>

  <h3 style="font-size:19px;margin:30px 0 12px">Your journey</h3>
  <div class="track">${PHASES.map(trackTile).join("")}</div>
</div>`;}
function trackTile(p){const cls=p.st==="cur"?"cur":p.st==="done"?"done":"";
  const mark=p.st==="done"?'<span style="color:var(--teal)">✓ done</span>':p.st==="cur"?'<span style="color:var(--teal-d)">in progress</span>':'<span class="muted">🔒 locked</span>';
  return `<div class="t ${cls}" ${p.st!=="lock"?'style="cursor:pointer" onclick="go(\''+(p.st==="cur"?"phase":"phase")+'\')"':''}><div class="s">${p.wk}</div><div class="nm">${p.name}</div><div class="s" style="margin-top:6px">${mark}</div></div>`;}
function feedRow(p){return `<div class="post"><div class="pav" style="background:${p.c}22;color:${p.c==='#187878'?'#0F6E56':p.c==='#5DCAA5'?'#0F6E56':'#B4553A'}">${p.who[0]}</div><div><div style="font-size:13.5px"><b>${p.who}</b></div><div style="font-size:14px" class="muted">${p.t}</div></div></div>`;}

/* ---------- PHASE (this week) ---------- */
function phase(){const done=S.mission.filter(Boolean).length;
  return memnav()+`<div class="wrap fadein" style="padding:24px 0 60px;max-width:820px">
  <button class="btn ghost sm" onclick="go('dashboard')">← Dashboard</button>
  <div style="margin-top:14px"><span class="wk">Week 2 · Phase 2</span><h1 style="font-size:30px;margin:4px 0 6px">Capture Your Value</h1>
  <p class="muted" style="font-size:16.5px">This is where experienced nurses skip past their own worth. This week you name it — out loud, on paper, and to your cohort.</p></div>

  <h3 style="font-size:16px;margin:24px 0 10px">1 · Learn</h3>
  <div class="lesson"><div class="thumb">▶</div><div><b>Value: what you bring with you</b><div class="muted" style="font-size:14px">9 min · Sue Adair</div><button class="btn ghost sm" style="margin-top:8px" onclick="alert('Prototype: the lesson video plays here.')">Watch lesson</button></div></div>

  <h3 style="font-size:16px;margin:26px 0 10px">2 · Do this week's mission</h3>
  <div id="mission">${missionHTML()}</div>
  <div style="margin-top:6px"><label class="muted" style="font-size:13px">One strength I want to carry into my next role</label>
  <textarea id="reflect" placeholder="Type it here — it saves to your workbook" oninput="S.reflect=this.value">${S.reflect}</textarea></div>

  <h3 style="font-size:16px;margin:26px 0 10px">3 · Share with your cohort</h3>
  <div class="card" style="padding:18px">
    <textarea id="post" placeholder="Share one strength you named this week..."></textarea>
    <div style="display:flex;justify-content:flex-end;margin-top:10px"><button class="btn" onclick="postToCohort()">Post to cohort</button></div>
  </div>

  <div class="card" style="padding:18px;margin-top:20px;display:flex;justify-content:space-between;align-items:center;gap:14px;background:var(--teal-t);border-color:var(--teal)">
    <div><b style="color:var(--navy)">Live cohort call · Thursday 6:00pm CT</b><div class="muted" style="font-size:14px">Bring one strength and one question.</div></div>
    <button class="btn sm" onclick="alert('Prototype: adds the call to your calendar.')">Add to calendar</button>
  </div>

  <div style="display:flex;justify-content:space-between;align-items:center;margin-top:24px">
    <span class="muted" style="font-size:14px">${done}/3 mission steps done</span>
    <button class="btn" onclick="completeWeek()">Mark week complete →</button>
  </div>
</div>`;}
function missionHTML(){const items=["List five strengths you keep dismissing","Circle the one you most want to keep using","Note one work condition you won't carry forward"];
  return items.map((t,i)=>`<label class="check ${S.mission[i]?'on':''}"><input type="checkbox" ${S.mission[i]?'checked':''} onchange="S.mission[${i}]=this.checked;document.getElementById('mission').innerHTML=missionHTML()"><span style="font-size:14.5px">${t}</span></label>`).join("");}
function postToCohort(){const el=document.getElementById("post");const v=(el.value||"").trim();if(!v){alert("Write something to share first.");return;}
  FEED.unshift({who:S.name+" (you)",c:"#187878",t:v});el.value="";alert("Shared with your cohort!");}
function completeWeek(){PHASES[2].st="done";if(PHASES[3])PHASES[3].st="cur";S.m2done=true;go("dashboard");}

/* ---------- COHORT FEED ---------- */
function cohort(){return memnav()+`<div class="wrap fadein" style="padding:24px 0 60px;max-width:680px">
  <button class="btn ghost sm" onclick="go('dashboard')">← Dashboard</button>
  <h1 style="font-size:28px;margin:14px 0 4px">Cohort 3</h1>
  <p class="muted">24 experienced nurses, moving through the program together. Week 2 of 6.</p>
  <div class="card" style="padding:18px;margin-bottom:16px"><textarea id="post2" placeholder="Share with your cohort..."></textarea><div style="display:flex;justify-content:flex-end;margin-top:10px"><button class="btn sm" onclick="(function(){var e=document.getElementById('post2');if(!e.value.trim()){alert('Write something first.');return;}FEED.unshift({who:S.name+' (you)',c:'#187878',t:e.value.trim()});go('cohort');})()">Post</button></div></div>
  <div class="card feed" style="padding:18px">${FEED.map(feedRow).join("")}</div>
</div>`;}

/* ---------- ROUTER ---------- */
function render(){let h="";
  if(S.screen==="landing")h=landing();
  else if(S.screen==="enroll")h=enrollScreen();
  else if(S.screen==="welcome_member")h=welcomeMember();
  else if(S.screen==="dashboard")h=dashboard();
  else if(S.screen==="phase")h=phase();
  else if(S.screen==="cohort")h=cohort();
  app().innerHTML="<div class='fadein'>"+h+"</div>";}
render();
</script>
<style>.fadein{animation:fi .3s ease}@keyframes fi{from{opacity:0}to{opacity:1}}</style>
</body>
</html>
